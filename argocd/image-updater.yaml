apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: image-updater
  namespace: argocd

spec:
  namespace: argocd

  writeBackConfig:
    method: "git:secret:argocd/image-updater-git-creds"
    gitConfig:
      repository: "https://github.com/shadowg9/MomoMats.git"
      branch: "main"
      writeBackTarget: "kustomization"

  applicationRefs:
    - namePattern: "momomats-app"
      images:
        - alias: "momomats"
          imageName: "ghcr.io/shadowg9/momomats"

          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^[a-f0-9]{40}$"

          manifestTargets:
            kustomize:
              name: "momomats-image"