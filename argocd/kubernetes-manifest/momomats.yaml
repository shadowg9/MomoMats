apiVersion: apps/v1
kind: Deployment
metadata:
  name: momomats
  labels:
    app: momomats
spec:
  replicas: 2
  selector:
    matchLabels:
      app: momomats
  template:
    metadata:
      labels:
        app: momomats
    spec:
      containers:
        - name: momomats
          image: momomats-image
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: momomats-service
  labels:
    app: momomats
spec:
  type: ClusterIP
  selector:
    app: momomats
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http